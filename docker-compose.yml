version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      -"3001:3001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_PATH=/data/triage.db
      - FRONTEND_URL=http://localhost:3000
      - NODE_ENV=production
      - PORT=3001
    volumes:
      - db-data:/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_SOCKET_URL: http://localhost:3001
      ports:
        - "3000:80"
      depends_on:
        - backend
      restart: unless_stopped

volumes:
  db-data:
    driver: local